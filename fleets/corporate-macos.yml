agent_options:
controls:
  enable_disk_encryption: true
  enable_recovery_lock_password: false
  ios_updates:
    deadline:
    minimum_version:
    update_new_hosts:
  ipados_updates:
    deadline:
    minimum_version:
    update_new_hosts:
  macos_updates:
    deadline:
    minimum_version:
    update_new_hosts:
  scripts:
  windows_require_bitlocker_pin: false
  windows_updates:
    deadline_days:
    grace_period_days:
labels:
name: Corporate-macOS
policies:
 - path: ../lib/policies/chrome-remote-desktop.policies.yml
 - path: ../lib/policies/firefox-installed.policies.yml
 - path: ../lib/policies/windows-device-health.policies.yml
reports:
settings:
  features:
    enable_host_users: true
    enable_software_inventory: true
    historical_data:
      uptime: true
      vulnerabilities: true
  host_expiry_settings:
    host_expiry_enabled: false
    host_expiry_window: 0
  integrations:
    conditional_access_enabled:
    google_calendar:
  webhook_settings:
    failing_policies_webhook:
      destination_url:
      enable_failing_policies_webhook: false
      host_batch_size: 0
    host_status_webhook:
software:
  fleet_maintained_apps:
  - categories:
    - "🖥️ Productivity"
    slug: chrome-remote-desktop-host/darwin
